<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FitWithSubha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 🔥 ROOT FIX (NO SHIFT EVER) */
html, body{
  max-width:100%;
  overflow-x:hidden;
}

/* 🔥 BODY (PERFECT CENTER FIX) */
body{
  font-family:'Poppins',sans-serif;

  min-height:100vh;
  min-height:100dvh; /* 🔥 MOBILE PERFECT FIX */

  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg,#eef2ff,#f8fbff);

  position:relative;
  padding:20px;

  overflow-x:hidden;
  overflow-y:auto;
}

/* 🔥 BACKGROUND GLOW (STABLE) */
body::before,
body::after{
  content:"";
  position:absolute;
  width:280px;
  height:280px;
  border-radius:50%;
  filter:blur(100px);
  z-index:0;
  pointer-events:none;
}

body::before{
  background:#6a11cb;
  top:-100px;
  left:-100px;
  opacity:0.3;
}

body::after{
  background:#2575fc;
  bottom:-100px;
  right:-100px;
  opacity:0.3;
}

/* 🔥 CONTAINER (NO OVERFLOW EVER) */
.container{
  width:100%;
  max-width:340px;
  margin:auto;

  padding:0 12px;

  text-align:center;
  position:relative;
  z-index:2;
}

/* LOGO */
.bmilogo{
  display:flex;
  justify-content:center;
  margin-bottom:18px;
}

.bmilogo-box{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(14px);
  padding:14px;
  border-radius:22px;

  box-shadow:
    0 15px 40px rgba(0,0,0,0.1),
    0 0 35px rgba(106,17,203,0.25);
}

.bmilogo-box img{
  height:70px;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:4px;
}

.subtitle{
  font-size:13px;
  color:#6b7280;
  margin-bottom:18px;
}

/* 🔥 CARD (MORE PREMIUM) */
.card{
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(18px);
  padding:24px;
  border-radius:24px;

  border:1px solid rgba(255,255,255,0.6);

  box-shadow:
    0 25px 60px rgba(0,0,0,0.08),
    0 10px 25px rgba(106,17,203,0.18);

  animation:fadeIn 0.5s ease;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:18px;
  text-align:left;
}

.input-group input{
  width:100%;
  padding:18px 14px 8px;
  border-radius:14px;
  border:1px solid #e5e7eb;
  background:#fff;

  font-size:14px;
  transition:all 0.25s ease;
}

/* FOCUS */
.input-group input:focus{
  outline:none;
  border:1.5px solid #6a11cb;

  box-shadow:
    0 0 0 4px rgba(106,17,203,0.12),
    0 8px 20px rgba(106,17,203,0.12);

  transform:translateY(-1px);
}

/* LABEL */
.input-group label{
  position:absolute;
  left:14px;
  top:15px;
  font-size:13px;
  color:#9ca3af;
  transition:0.2s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
  top:5px;
  font-size:11px;
  color:#6a11cb;
}

/* ERROR */
.input-error{
  border:1.5px solid #ef4444 !important;
  box-shadow:0 0 0 3px rgba(239,68,68,0.15);
}

.error-text{
  font-size:12px;
  color:#ef4444;
  margin-top:5px;
}

/* EYE */
.eye{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#9ca3af;
}

.eye:hover{
  color:#6a11cb;
}

/* 🔥 BUTTON (NEXT LEVEL) */
.login-btn{
  position:relative;
  overflow:hidden;

  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;

  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:#fff;
  font-weight:600;
  font-size:15px;

  cursor:pointer;
  margin-top:10px;

  box-shadow:
    0 12px 25px rgba(37,117,252,0.35),
    0 0 20px rgba(106,17,203,0.25);

  transition:0.25s;
}

/* HOVER */
.login-btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 18px 35px rgba(37,117,252,0.45),
    0 0 25px rgba(106,17,203,0.3);
}

/* CLICK */
.login-btn:active{
  transform:scale(0.96);
}

/* LOADING */
.login-btn.loading{
  pointer-events:none;
  opacity:0.8;
}

.login-btn.loading::before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border:3px solid rgba(255,255,255,0.6);
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.login-btn.loading span{
  visibility:hidden;
}

/* GUEST */
.guest-btn{
  background: rgba(255,255,255,0.7);
  color:#444;

  backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,0.6);

  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.guest-btn:hover{
  background:#6b7280;
  color:#fff;
}

/* LINKS */
.link{
  margin-top:22px;
  font-size:13px;
  color:#6a11cb;
  cursor:pointer;
  margin-bottom:8px;
}

.link:hover{
  text-decoration:underline;
}

/* SIGNUP */
.signup-box{
  margin-top:18px;
  padding:16px;
  border-radius:20px;

  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);

  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.signup-box span{
  color:#6a11cb;
  font-weight:600;
  cursor:pointer;
}

/* MSG */
.msg{
  margin-top:10px;
  font-size:13px;
}

.success{color:#22c55e;}
.error{color:#ef4444;}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes spin{
  0%{transform:translate(-50%,-50%) rotate(0);}
  100%{transform:translate(-50%,-50%) rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">

<div class="bmilogo">
  <div class="bmilogo-box">
    <img src="bmilogo.png">
  </div>
</div>

<div class="card">

<!-- EMAIL -->
<div class="input-group">
  <input type="email" id="email" placeholder=" ">
  <label>Email</label>
  <div id="emailError" class="error-text"></div>
</div>

<!-- PASSWORD -->
<div class="input-group">
  <input type="password" id="password" placeholder=" ">
  <label>Password</label>

  <span class="eye" onclick="togglePass()">
    <i id="eyeIcon" class="fa-solid fa-eye-slash"></i>
  </span>

  <div id="passError" class="error-text"></div>
</div>

<button class="login-btn" id="loginBtn" onclick="login()">Login</button>
<button class="login-btn" style="background:#9ca3af;" onclick="continueGuest()">
  👤 Continue as Guest
</button>

<div class="link" onclick="resetPassword()">Forgot password?</div>

<div id="msg" class="msg"></div>

</div>

<div class="signup-box">
New here? <span onclick="window.location.href='signup.html'">Create account</span>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  onAuthStateChanged, 
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZIjOvVaHMrl8iDt9u5XqBZx8u9Kw0Mqk",
  authDomain: "fitwithsubha.firebaseapp.com",
  projectId: "fitwithsubha",
  storageBucket: "fitwithsubha.firebasestorage.app",
  messagingSenderId: "783014767318",
  appId: "1:783014767318:web:667a91a7f39936c60c7777"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* AUTO LOGIN */
onAuthStateChanged(auth, user => {
  if(user){
    window.location.href = "bodystat.html";
  }
});

/* LOGIN */
window.login = function(){

  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("password").value;

  let emailEl = document.getElementById("email");
  let passEl = document.getElementById("password");

  let emailErr = document.getElementById("emailError");
  let passErr = document.getElementById("passError");

  let msg = document.getElementById("msg");
  let btn = document.getElementById("loginBtn");

  // CLEAR
  emailErr.innerText="";
  passErr.innerText="";
  msg.innerHTML="";

  emailEl.classList.remove("input-error");
  passEl.classList.remove("input-error");

  let hasError=false;

  if(!email){
    emailEl.classList.add("input-error");
    emailErr.innerText="Enter email";
    hasError=true;
  }

  if(!pass){
    passEl.classList.add("input-error");
    passErr.innerText="Enter password";
    hasError=true;
  }

  if(hasError) return;

  btn.innerText="Logging...";
  btn.disabled=true;

  signInWithEmailAndPassword(auth,email,pass)
  .then(()=>{
    msg.innerHTML="<div class='success'>Login success 🚀</div>";
    setTimeout(()=>window.location.href="bodystat.html",1000);
  })
.catch(e=>{

  console.log(e.code);

  if(e.code==="auth/user-not-found"){
    emailEl.classList.add("input-error");
    emailErr.innerText="Email not registered";
  }
  else if(e.code==="auth/wrong-password"){
    passEl.classList.add("input-error");
    passErr.innerText="Wrong password";
  }
  else if(e.code==="auth/invalid-credential"){
    // 🔥 smart fallback
    emailEl.classList.add("input-error");
    passEl.classList.add("input-error");

    msg.innerHTML="<div class='error'>Email not registered or password incorrect</div>";
  }
  else if(e.code==="auth/invalid-email"){
    emailEl.classList.add("input-error");
    emailErr.innerText="Invalid email format";
  }
  else{
    msg.innerHTML="<div class='error'>Login failed. Try again</div>";
  }

  btn.innerText="Login";
  btn.disabled=false;
});
}

/* RESET PASSWORD */
window.resetPassword = function(){

  let email = document.getElementById("email").value.trim();

  let emailEl = document.getElementById("email");
  let passEl = document.getElementById("password");

  let emailErr = document.getElementById("emailError");
  let passErr = document.getElementById("passError");

  let msg = document.getElementById("msg");

  // CLEAR EVERYTHING
  emailEl.classList.remove("input-error");
  passEl.classList.remove("input-error");

  emailErr.innerText="";
  passErr.innerText="";
  msg.innerHTML="";

  if(!email){
    emailEl.classList.add("input-error");
    emailErr.innerText="Enter your email";
    return;
  }

  sendPasswordResetEmail(auth,email)
  .then(()=>{
    msg.innerHTML="<div class='success'>📩 Reset link sent!</div>";
  })
  .catch(e=>{
    msg.innerHTML="<div class='error'>"+e.message+"</div>";
  });
}

/* TOGGLE */
window.togglePass = function(){
  let p=document.getElementById("password");
  let icon=document.getElementById("eyeIcon");

  if(p.type==="password"){
    p.type="text";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }else{
    p.type="password";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }
}
// 🔥 REMOVE ERROR ON TYPING (LIVE FIX)
// 🔥 REMOVE ERROR ON TYPING (FINAL FIX)
document.addEventListener("DOMContentLoaded", () => {

  ["email","password"].forEach(id=>{
    let el = document.getElementById(id);

    if(!el) return;

    el.addEventListener("input", ()=>{

      el.classList.remove("input-error");

      if(id==="email"){
        document.getElementById("emailError").innerText="";
      }

      if(id==="password"){
        document.getElementById("passError").innerText="";
      }

    });
  });
// 👤 GUEST MODE
window.continueGuest = function(){

  localStorage.setItem("guest", "true");

  window.location.href = "bodystat.html";
};
});

</script>
</body>
</html>
