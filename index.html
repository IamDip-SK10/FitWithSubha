<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitWithSubha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ✅ FIX MOVEMENT ISSUE (IMPORTANT) */
html, body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg,#6a11cb,#2575fc);

  position:relative;
  overflow-x:hidden;
  overflow-y:auto;

  transition:0.4s;
}

/* FADE OUT */
body.fade-out{
  opacity:0;
}

/* CARD */
.card{
  position:relative;
  width:92%;
  max-width:420px;
  padding:55px 30px;
  border-radius:26px;
  text-align:center;
  color:#fff;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);

  border:1px solid rgba(255,255,255,0.25);

  /* 🔥 CLEAN SHADOW (LESS MUDDY) */
  box-shadow:
    0 25px 60px rgba(0,0,0,0.35),
    0 10px 25px rgba(106,17,203,0.25);

  animation:fadeIn 0.6s ease;
  z-index:2;
}

/* SOFT GLOW (CONTROLLED) */
.card::before{
  content:"";
  position:absolute;
  inset:-30px;
  background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  z-index:-1;
}

/* LOGO */
.logo img{
  width:135px;
  border-radius:22px;
  padding:14px;

  background: rgba(255,255,255,0.15);

  box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 12px 30px rgba(0,0,0,0.4);

  animation: logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* TEXT */
.subtitle{
  margin-top:22px;
  font-size:22px;
  font-weight:700;
  line-height:1.5;

  text-shadow:0 2px 8px rgba(0,0,0,0.25);

  animation: fadeInText 1s ease;
}

.welcome{
  margin-top:16px;
  font-size:16px;
  opacity:0.9;
}

.countdown{
  margin-top:22px;
  font-size:15px;
  opacity:0.85;
}

/* PROGRESS BAR */
.progress-bar{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  margin-top:12px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6a11cb,#2575fc);
  transition:width 1s linear;
}

/* BUTTON */
button{
  margin-top:22px;
  padding:14px 28px;
  border:none;
  border-radius:30px;

  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:#fff;

  font-size:16px;
  font-weight:600;
  cursor:pointer;

  box-shadow:
    0 10px 25px rgba(37,117,252,0.4);

  transition:.25s;

  /* 🔥 SUBTLE PULSE (NOT OVERPOWERING) */
  animation: pulse 2.5s infinite;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:
    0 15px 35px rgba(37,117,252,0.55);
}

button:active{
  transform:scale(0.96);
}

/* FOOTER */
.footer{
  margin-top:24px;
  font-size:12px;
  opacity:0.7;
}

/* ORBS (FIXED POSITION — NO SHIFT) */
.orb{
  position:absolute;
  width:140px;
  height:140px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,255,255,0.25), transparent);
  filter: blur(45px);
  animation: float 6s ease-in-out infinite;
  pointer-events:none;
}

.o1{top:-40px; left:-40px;}
.o2{top:-40px; right:-40px;}
.o3{bottom:-40px; left:-40px;}
.o4{bottom:-40px; right:-40px;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeInText{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* 🔥 CLEAN PULSE */
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,255,255,0.25);}
  70%{box-shadow:0 0 0 12px rgba(255,255,255,0);}
  100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}

</style>
</head>

<body>

<div class="card">

<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>
<div class="orb o4"></div>

<div class="logo">
    <img src="bmilogo.png" onerror="this.style.display='none'">
</div>

<div class="subtitle">
    Transform your body.<br>Transform your life.
</div>

<div class="welcome">
    This is where everything changes 🔥
</div>

<div class="countdown" id="countdown">
    Starting in 5...
</div>

<div class="progress-bar">
    <div class="progress" id="progress"></div>
</div>

<div class="helper">
    Skip the wait — start instantly ⚡
</div>

<button onclick="goNow()">
Start Now 🚀
</button>

<div class="footer">
    © FitWithSubha — Subhadip
</div>

</div>

<script>
let total = 5;
let count = total;

const el = document.getElementById("countdown");
const progress = document.getElementById("progress");

el.innerText = "Starting in " + total + " Second...";

const timer = setInterval(() => {
    count--;

    if(count > 0){
        el.innerText = "Starting in " + count + " Second...";
        progress.style.width = ((total - count) / total) * 100 + "%";
    }else{
        el.innerText = "Let's go 🔥";
        progress.style.width = "100%";
        clearInterval(timer);

        setTimeout(() => {
            goNow();
        }, 600);
    }
}, 1000);

function goNow(){
    document.body.classList.add("fade-out");

    setTimeout(()=>{
        redirectUser();
    }, 400);
}
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZIjOvVaHMrl8iDt9u5XqBZx8u9Kw0Mqk",
  authDomain: "fitwithsubha.firebaseapp.com",
  projectId: "fitwithsubha",
  storageBucket: "fitwithsubha.firebasestorage.app",
  messagingSenderId: "783014767318",
  appId: "1:783014767318:web:667a91a7f39936c60c7777"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔥 STORE USER STATE */
window.redirectUser = function(){
  onAuthStateChanged(auth, user => {
    if(user){
      window.location.href = "bodystat.html";
    }else{
      window.location.href = "login.html";
    }
  });
};

</script>
</body>
</html>
