<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fitness Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eaf4ff,#f7fbff);
padding:20px;
}

.container{
background:#fff;
padding:25px;
border-radius:22px;
max-width:450px;
margin:auto;
box-shadow:0 20px 50px rgba(0,0,0,0.12);
}

.title-box{
padding:14px;
margin-bottom:18px;
text-align:center;
border:2px solid #6a11cb;
border-radius:14px;
}

.main-title{
font-size:24px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#666;
font-size:14px;
margin-bottom:20px;
}

.block{
background:#f9fbff;
padding:15px;
border-radius:16px;
margin-bottom:18px;
border:1px solid rgba(106,17,203,0.08);
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.label{font-weight:600;margin-bottom:5px;}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
transition:.2s;
}

input:focus,select:focus{
outline:none;
border:1.5px solid #6a11cb;
box-shadow:0 0 0 3px rgba(106,17,203,0.15);
}

.input-error{
border:1.5px solid #ef4444 !important;
box-shadow:0 0 0 3px rgba(239,68,68,0.15);
}

.height-row{display:flex;gap:10px;}
.height-row input{flex:1;}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:#fff;
font-size:16px;
cursor:pointer;
box-shadow:0 10px 25px rgba(106,17,203,0.25);
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 15px 30px rgba(106,17,203,0.35);
}

.result{
margin-top:20px;
padding:22px;
border-radius:18px;
background:linear-gradient(135deg,#eef2ff,#f5f7ff);
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fadeUp .4s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

.error{
color:#ef4444;
font-weight:600;
line-height:1.8;
background:#fff1f1;
padding:14px;
border-radius:12px;
border:1px solid rgba(239,68,68,0.2);
}

.cal-box{
background:#fff;
padding:14px;
border-radius:12px;
margin-top:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

.footer{
text-align:center;
font-size:12px;
color:#aaa;
margin-top:15px;
}

.back-btn{
position:fixed;
bottom:18px;
right:18px;
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.2s;
opacity:0.9;
}

.back-btn:active{
transform:scale(0.9);
}

.back-btn:hover{
opacity:1;
}
.error{
color:#ef4444;
font-weight:600;
line-height:1.8;
background:#fff1f1;
padding:14px;
border-radius:12px;
border:1px solid rgba(239,68,68,0.2);
}
/* NAV BUTTONS */
.nav-buttons{
display:flex;
gap:12px;
margin-top:20px;
}

.nav-btn{
flex:1;
padding:12px;
border:none;
border-radius:30px;
color:#fff;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:0.2s;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.nav-active{
background:#22c55e;
}

.nav-secondary{
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.nav-btn:active{
transform:scale(0.97);
}
</style>
</head>

<body>

<div class="container">

<div class="title-box">
<h1 class="main-title">Smart Fitness Plan 🚀</h1>
</div>

<p class="subtitle">Let’s make your dream fitness together 💪</p>

<div class="block">
<p class="label">Height :</p>

<select id="heightUnit">
<option value="ft">Feet + Inches</option>
<option value="cm">Height in cm</option>
<option value="inch">Height in inches</option>
</select>

<div class="height-row">
<input type="number" id="height" placeholder="Enter feet">
<input type="number" id="inchExtra" placeholder="Enter inches">
</div>
</div>

<div class="block">
<p class="label">Weight :</p>

<select id="weightUnit">
<option value="kg">Weight in kg</option>
<option value="lbs">Weight in lbs</option>
</select>

<input type="number" id="currentWeight" placeholder="Current weight">
<input type="number" id="targetWeight" placeholder="Target weight">
</div>

<div class="block">
<p class="label">Time Period (weeks) :</p>
<input type="number" id="weeks" placeholder="Enter weeks">
</div>

<div class="block">
<p class="label">Age :</p>
<input type="number" id="age" placeholder="Age">
</div>

<div class="block">
<p class="label">Gender :</p>
<select id="gender">
<option value="">Select gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>

<div class="block">
<p class="label">Activity Level :</p>
<select id="activity">
<option value="">Select activity</option>
<option value="1.2">Sedentary</option>
<option value="1.375">Light</option>
<option value="1.55">Moderate</option>
<option value="1.725">Active</option>
</select>
</div>

<button onclick="calculatePlan()">Calculate Plan</button>

<div class="result" id="result"></div>
<!-- NAV BUTTONS -->

<div class="nav-buttons">

<button class="nav-btn nav-secondary"
onclick="window.location.href='bodystat.html'">
🏠 Stats
</button>

<button class="nav-btn nav-active">
📋 Plan
</button>

<button class="nav-btn nav-secondary"
onclick="window.location.href='progress.html'">
📈 Progress
</button>

</div>

<!-- FOOTER -->
<div class="footer" style="margin-top:15px;">
© FitWithSubha — Subhadip
</div>

<div class="back-btn" onclick="history.back()">←</div>

<script>
  /* FIX OLD BROKEN DATA (SAFE) */


/* ELEMENTS */
const heightUnit = document.getElementById("heightUnit");
const heightInput = document.getElementById("height");
const inchInput = document.getElementById("inchExtra");

const weightUnit = document.getElementById("weightUnit");
const currentWeight = document.getElementById("currentWeight");
const targetWeight = document.getElementById("targetWeight");
/* STATE */
let lastHeightUnit = "ft";
let lastWeightUnit = "kg";
let isFirstLoad = true;

/* HEIGHT UI */
function updateHeightFields(){
    if(heightUnit.value==="ft"){
        inchInput.style.display="block";
    }else{
        inchInput.style.display="none";
        inchInput.value="";
    }
}

/* AUTO LOAD */
window.onload = function(){

    let fromBMI = localStorage.getItem("fromBMI");

    /* ✅ ONLY LOAD DATA IF COMING FROM BMI */
    if(fromBMI === "true"){

        let hu = localStorage.getItem("heightUnit");
        let h = localStorage.getItem("heightValue");
        let inch = localStorage.getItem("inchExtra");

        let w = localStorage.getItem("weight");
        let age = localStorage.getItem("age");
        let gender = localStorage.getItem("gender");
        let act = localStorage.getItem("activity");

        if(hu){
            heightUnit.value = hu;
            lastHeightUnit = hu;
        }

        if(hu==="ft"){
            heightInput.value = h || "";
            inchInput.value = inch || "";
        }else if(h){
            heightInput.value = Math.round(h);
        }

        if(w){
            currentWeight.value = Math.round(w);
        }

        if(age) document.getElementById("age").value = age;
        if(gender) document.getElementById("gender").value = gender;
        if(act) document.getElementById("activity").value = act;

        updateHeightFields();

        /* 🔥 REMOVE FLAG */
        localStorage.removeItem("fromBMI");
    }

    /* ❌ DIRECT OPEN → CLEAR FORM */
    else{
        document.querySelectorAll("input").forEach(el=>el.value="");
        document.querySelectorAll("select").forEach(el=>el.selectedIndex=0);
        document.getElementById("result").innerHTML = "";
    }
  let saved = localStorage.getItem("savedPlan");

if(saved){
    let data = JSON.parse(saved);

    document.getElementById("result").innerHTML = `
    <div class="cal-box">
        📌 <b>Last Saved Plan</b><br><br>

        ⚖️ Weight: ${data.weight} → ${data.targetWeight}<br>
        📅 Duration: ${data.weeks} weeks<br><br>

        🔥 Calories: ${data.currentCalories}<br>
        🎯 Target: ${data.targetCalories}<br>
        📉 ${data.perWeek} kg/week<br><br>

        🕒 Saved on: ${data.date}
    </div>
    `;
}
    setTimeout(()=>{ isFirstLoad = false; },300);
};

/* HEIGHT CONVERSION (FIXED PERFECTLY) */
heightUnit.addEventListener("change", function(){

    if(isFirstLoad) return;

    let h = parseFloat(heightInput.value);
    let inch = parseFloat(inchInput.value) || 0;

    if(isNaN(h)) return;

    /* convert everything → cm first */
    let cm;

    if(lastHeightUnit === "ft"){
        cm = ((h * 12) + inch) * 2.54;
    }
    else if(lastHeightUnit === "inch"){
        cm = h * 2.54;
    }
    else{
        cm = h;
    }

    /* convert from cm → selected */
    if(this.value === "cm"){
        heightInput.value = Math.round(cm);
    }
    else if(this.value === "inch"){
        heightInput.value = (cm / 2.54).toFixed(1);
    }
    else{
        let totalInches = cm / 2.54;
        heightInput.value = Math.floor(totalInches / 12);
        inchInput.value = Math.round(totalInches % 12);
    }

    lastHeightUnit = this.value;
    updateHeightFields();
});

/* WEIGHT CONVERSION (FIXED BUG) */
weightUnit.addEventListener("change", function(){

    let cw = parseFloat(currentWeight.value);
    let tw = parseFloat(targetWeight.value);

    function convert(val){
        if(isNaN(val)) return "";

        let kg = lastWeightUnit === "kg" ? val : val / 2.20462;

        return weightUnit.value === "kg"
            ? Math.round(kg)
            : (kg * 2.20462).toFixed(1);
    }

    currentWeight.value = convert(cw);
    targetWeight.value = convert(tw);

    lastWeightUnit = weightUnit.value;
});
/* ERROR SYSTEM */
function clearErrors(){
    document.querySelectorAll("input,select")
    .forEach(el=>el.classList.remove("input-error"));
}

function markError(id){
    document.getElementById(id).classList.add("input-error");
}

function showError(messages){
let formatted = messages.map(msg => `⚠️ ${msg}`).join("<br>");
document.getElementById("result").innerHTML =
`<div class="error">${formatted}</div>`;
}

/* MAIN */
function calculatePlan(){

    clearErrors();
    let errors=[];

    let h=parseFloat(heightInput.value);
    let hu=heightUnit.value;
    let inch=parseFloat(inchInput.value)||0;

    let cw=parseFloat(currentWeight.value);
    let tw=parseFloat(document.getElementById("targetWeight").value);
    if(cw > 500){
    markError("currentWeight");
    errors.push("Damn,Weight exceeds realistic human limit!");
}

if(tw > 500){
    markError("targetWeight");
    errors.push("Target weight exceeds realistic human limit");
}
    let wu=weightUnit.value;

    let weeks=parseFloat(document.getElementById("weeks").value);
    let age=parseFloat(document.getElementById("age").value);
    let gender=document.getElementById("gender").value;
    let act=document.getElementById("activity").value;

    if(isNaN(h)){ markError("height"); errors.push("Enter height"); }

/* HEIGHT LIMIT */
if(hu === "ft" && h > 10){
markError("height");
errors.push("Height exceeds realistic human limit");
}

if(hu === "cm" && h > 305){
markError("height");
errors.push("Height exceeds realistic human limit");
}

if(hu === "inch" && h > 120){
markError("height");
errors.push("Height exceeds realistic human limit");
}
if(isNaN(cw)){ markError("currentWeight"); errors.push("Enter current weight"); }
if(isNaN(tw)){ markError("targetWeight"); errors.push("Enter target weight"); }
if(isNaN(weeks)){ markError("weeks"); errors.push("Enter weeks"); }
if(isNaN(age)){ markError("age"); errors.push("Enter age"); }
if(gender===""){ markError("gender"); errors.push("Select gender"); }
if(act===""){ markError("activity"); errors.push("Select activity"); }
if(hu==="ft" && inch>=12){ markError("inchExtra"); errors.push("Inches must be 0-11"); }

    if(errors.length>0){
        showError(errors);
        return;
    }

    let heightCM = hu==="cm"?h:hu==="inch"?h*2.54:((h*12)+inch)*2.54;
    let currentKG = wu==="kg"?cw:cw/2.20462;
    let targetKG = wu==="kg"?tw:tw/2.20462;
/* SAVE CURRENT + TARGET */
// 🔥 ALWAYS RESET HISTORY WHEN NEW PLAN IS CREATED
/* 🔥 SYNC WITH PROGRESS PAGE */

/* SAVE TARGET (ALWAYS) */
localStorage.setItem("targetWeight", targetKG.toFixed(1));

/* SET INITIAL HISTORY (ONLY FIRST TIME) */
let history = JSON.parse(localStorage.getItem("weightHistory")) || [];

if(history.length === 0){
  history = [{
    weight: currentKG,
    date: new Date().toISOString()
  }];
  localStorage.setItem("weightHistory", JSON.stringify(history));
}
    let bmr = gender==="male"
    ?10*currentKG+6.25*heightCM-5*age+5
    :gender==="female"
    ?10*currentKG+6.25*heightCM-5*age-161
    :10*currentKG+6.25*heightCM-5*age-78;

    let currentCalories=Math.round(bmr*act);

    let diff=Math.abs(currentKG-targetKG);
    let perWeek=(diff/weeks).toFixed(2);
    // 🔥 HEALTH CHECK
let warningMsg = "";

if(currentKG > targetKG){
    // FAT LOSS
    if(perWeek > 1){
        warningMsg = "⚠️ You are trying to lose weight too fast. This can cause muscle loss & health issues.";
    }
    if(targetKG < (18.5 * ((heightCM/100)**2))){
        warningMsg = "⚠️ Target weight is underweight range. Not recommended.";
    }
}
else{
    // WEIGHT GAIN
    if(perWeek > 0.75){
        warningMsg = "⚠️ Too fast weight gain may lead to fat gain instead of muscle.";
    }
    if(targetKG > (30 * ((heightCM/100)**2))){
        warningMsg = "⚠️ Target weight falls in obese range. Not healthy.";
    }
}
    let healthMsg = "";
let healthColor = "";
let guideText = "";

/* FAT LOSS */
if(currentKG > targetKG){

    guideText = "(Healthy fat loss: 0.5–1 kg/week)";

    if(perWeek <= 1){
        healthMsg = "Healthy fat loss range ✅";
        healthColor = "#22c55e";
    }else{
        healthMsg = "Too aggressive fat loss ⚠️";
        healthColor = "#ef4444";
    }
}

/* WEIGHT GAIN */
else{

    guideText = "(Healthy weight gain: 0.25–0.5 kg/week)";

    if(perWeek <= 0.5){
        healthMsg = "Healthy weight gain range 💪";
        healthColor = "#22c55e";
    }else{
        healthMsg = "Too fast weight gain ⚠️";
        healthColor = "#f97316";
    }
}
    let dailyChange=Math.round((diff*7700)/(weeks*7));

    let targetCalories=currentKG>targetKG
    ?currentCalories-dailyChange
    :currentCalories+dailyChange;

    let goalType=currentKG>targetKG?"deficit":"surplus";
// 🤖 AI SUGGESTION ENGINE
let aiAdvice = "";
let aiWorkout = "";
let aiDiet = "";

/* FAT LOSS */
if(currentKG > targetKG){

    aiAdvice = "Focus on consistency. Small calorie deficit daily will give long-term results.";

    aiDiet = `
    🍽️ High Protein Diet:<br>
    • Eggs / Chicken / Paneer<br>
    • Rice + Dal (controlled)<br>
    • Avoid sugar & junk
    `;

    aiWorkout = `
    🏋️ Workout Plan:<br>
    • 4–5 days strength training<br>
    • 20 min cardio daily<br>
    • Core exercises 3x/week
    `;
}

/* WEIGHT GAIN */
else{

    aiAdvice = "Eat in surplus but keep it clean. Focus on muscle gain, not fat.";

    aiDiet = `
    🍽️ Muscle Gain Diet:<br>
    • High protein + carbs<br>
    • Milk, peanut butter, rice<br>
    • Eat 4–5 meals/day
    `;

    aiWorkout = `
    🏋️ Workout Plan:<br>
    • Heavy strength training<br>
    • Progressive overload<br>
    • Less cardio
    `;
}

/* TOO AGGRESSIVE */
if(perWeek > 1){
    aiAdvice = "⚠️ Your plan is too aggressive. Slow down for sustainable results.";
}
    document.getElementById("result").innerHTML =
`
<div class="cal-box">🔥 <b>Current Calories</b><br>${currentCalories} kcal/day</div>
<div class="cal-box">🎯 <b>Target Calories</b><br>${targetCalories} kcal/day</div>

<div style="margin-top:16px;">
⚡ Daily ${dailyChange} kcal ${goalType}
</div>

<div>
📉 This will result in approx <b>${perWeek} kg/week</b>
</div>

<div style="margin-top:6px;font-weight:600;color:${healthColor};">
${healthMsg}
</div>

<div style="font-size:12px;color:#888;margin-top:4px;">
${guideText}
</div>

${warningMsg ? `<div style="
margin-top:10px;
color:#ef4444;
font-weight:600;
font-size:13px;
">${warningMsg}</div>` : ""}

<div style="margin-top:18px;font-weight:600;">
Next Step 👇
</div>

<!-- 🤖 AI SUGGESTION -->
<div class="cal-box" style="margin-top:15px;text-align:left;">

<b>🤖 Smart AI Suggestions</b><br><br>

<div style="font-size:13px;color:#555;">
${aiAdvice}
</div>

<div style="margin-top:10px;font-size:13px;">
${aiDiet}
</div>

<div style="margin-top:10px;font-size:13px;">
${aiWorkout}
</div>

</div>

<!-- BUTTON ROW -->
<div style="display:flex; gap:10px; margin-top:12px;">

  <button class="save-btn" style="
    flex:1;
    padding:10px;
    border:none;
    border-radius:25px;
    font-size:13px;
    font-weight:600;
    color:#fff;
    background:#22c55e;
    cursor:pointer;
  ">
    💾 Save
  </button>

  <button class="share-btn" style="
    flex:1;
    padding:10px;
    border:none;
    border-radius:25px;
    font-size:13px;
    font-weight:600;
    color:#fff;
    background:#0ea5e9;
    cursor:pointer;
  ">
    📤 Share
  </button>

  <button onclick="localStorage.removeItem('savedPlan'); location.reload();" style="
    flex:1;
    padding:10px;
    border:none;
    border-radius:25px;
    font-size:13px;
    font-weight:600;
    color:#fff;
    background:#ef4444;
    cursor:pointer;
  ">
    🗑️ Clear
  </button>

</div>


<div style="
margin-top:20px;
padding:18px;
border-radius:18px;
background:linear-gradient(135deg,#f3f0ff,#eef2ff);
border:1px solid rgba(106,17,203,0.15);
box-shadow:0 8px 25px rgba(106,17,203,0.08);
text-align:center;
">

<div style="
font-weight:700;
font-size:16px;
margin-bottom:6px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
">
🚀 My Transformation
</div>

<p style="
font-size:13px;
color:#444;
margin-bottom:6px;
">
Thinking this routine might be hard to follow?
</p>

<p style="
font-size:12px;
color:#666;
margin-bottom:12px;
">
I felt the same once — here’s how I changed my life in 1 year 💪
</p>

<button onclick="window.location.href='myjourney.html'" style="
padding:12px 20px;
border-radius:25px;
font-size:14px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:#fff;
border:none;
box-shadow:0 6px 18px rgba(106,17,203,0.25);
cursor:pointer;
">
How I Did It 🔥 →
</button>

</div>
`;
const saveBtn = document.querySelector(".save-btn");

if(saveBtn){
    saveBtn.onclick = function(){
        // Force-calculate the target in KG right now from the input box
        let twInput = Number(document.getElementById("targetWeight").value);
        let wu = document.getElementById("weightUnit").value;
        let finalTargetKG = wu === "kg" ? twInput : twInput / 2.20462;

        const data = {
            currentCalories,
            targetCalories,
            perWeek,
            goalType,
            weight: currentKG, 
            targetWeight: finalTargetKG.toFixed(1), // Fix: Save the fresh value
            weeks: Number(document.getElementById("weeks").value),
            date: new Date().toLocaleString()
        };

        // Fix: Update BOTH keys so the Progress page sees the change
        localStorage.setItem("savedPlan", JSON.stringify(data));
        localStorage.setItem("targetWeight", finalTargetKG.toFixed(1)); 

        alert("✅ Plan Saved! New target: " + finalTargetKG.toFixed(1) + " kg");
    };
}
/* ✅ SCROLL TO RESULT */
setTimeout(() => {
    document.getElementById("result").scrollIntoView({
        behavior: "smooth",
        block: "nearest"
    });
}, 100);
}

/* REMOVE ERROR HIGHLIGHT ON INPUT */
document.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("input", ()=>{
        el.classList.remove("input-error");
    });
});
</script>
</body>
</html>
